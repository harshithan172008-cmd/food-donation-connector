<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Volunteer Login</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>

  <nav>
    <h1>🍱 Food Donation Connector</h1>
    <div>
      <a href="../index.html">Home</a>
      <a href="../restaurant/login.html">Restaurant</a>
      <a href="../ngo/login.html">NGO</a>
    </div>
  </nav>

  <div class="ngo-login-container">

    <div class="ngo-image-side">
      <img src="../images/volunteer.png" alt="Volunteers"/>
      <div class="ngo-overlay">
        <h3>"Small acts of kindness change the world"</h3>
        <p>Join our volunteer network and feed someone today</p>
      </div>
    </div>

    <div class="ngo-form-side">
      <div class="auth-box">
        <h2> Volunteer Login</h2>
        <p class="auth-sub">Welcome back! Login to find food near you.</p>

        <input type="email" id="email" placeholder="Email Address" />
        <input type="password" id="password" placeholder="Password" />
        <button onclick="handleLogin()">Login</button>

        <p class="switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
      </div>
    </div>

  </div>

  <script type="module" src="../js/app.js"></script>

</body>
</html>
