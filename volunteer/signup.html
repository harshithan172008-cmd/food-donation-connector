<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Volunteer Signup</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>

  <nav>
    <h1>🍱 Food Donation Connector</h1>
    <div>
      <a href="../index.html">Home</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <div class="ngo-login-container">

    <div class="ngo-image-side">
      <img src="../images/volunteer.png" alt="Volunteers"/>
      <div class="ngo-overlay">
        <h3>"Be the change you wish to see"</h3>
        <p>Register as a volunteer and start making a difference</p>
      </div>
    </div>

    <div class="ngo-form-side">
      <div class="auth-box">
        <h2> Volunteer Signup</h2>
        <p class="auth-sub">Register to claim and deliver food to those in need</p>

        <input type="text" id="fullName" placeholder="Full Name" />
        <input type="email" id="email" placeholder="Email Address" />
        <input type="tel" id="phone" placeholder="Phone Number" />
        <input type="text" id="area" placeholder="Your Area / Locality" />
        <input type="password" id="password" placeholder="Password" />
        <input type="password" id="confirmPassword" placeholder="Confirm Password" />
        <button onclick="handleSignup()">Join as Volunteer</button>

        <p class="switch">Already have an account? <a href="login.html">Login</a></p>
      </div>
    </div>

  </div>

  <script type="module" src="../js/app.js"></script>

</body>
</html>
