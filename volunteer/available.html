<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Find Food</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/listings.css" />
</head>
<body>

  <nav>
    <h1>🍱 Food Donation Connector</h1>
    <div>
      <a href="../index.html">Home</a>
      <a href="../index.html" onclick="handleLogout()">Logout</a>
    </div>
  </nav>

  <div class="dashboard-container">

    <div class="sidebar">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="available.html" class="active">🍱 Find Food</a>
      <a href="my-deliveries.html">🚴 My Deliveries</a>
    </div>

    <div class="main">
      <h2>Find Food Nearby</h2>
      <p class="welcome">Claim food and deliver it to someone in need</p>

      <div class="filters">
        <input type="text" id="searchInput" placeholder="🔍 Search food..."/>
        <select id="categoryFilter">
          <option value="">All Categories</option>
          <option>Cooked Food</option>
          <option>Raw Vegetables</option>
          <option>Bakery Items</option>
          <option>Dairy Products</option>
          <option>Fruits</option>
          <option>Other</option>
        </select>
      </div>

      <div class="listings-grid" id="listingsGrid">
</div>

  <script type="module" src="../js/app.js"></script>

</body>
</html>
