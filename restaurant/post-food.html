<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post Food</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>

  <nav>
    <h1>🍱 Food Donation Connector</h1>
    <div>
      <a href="../index.html">Home</a>
      <a href="../index.html" onclick="handleLogout()">Logout</a>
    </div>
  </nav>

  <div class="dashboard-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="post-food.html" class="active">➕ Post Food</a>
      <a href="my-donations.html">🍱 My Donations</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
      <h2>Post Surplus Food</h2>
      <p class="welcome">Fill in the details of the food you want to donate</p>

      <div class="form-box">
        <div class="form-group">
          <label>Food Name</label>
          <input type="text" id="foodName" placeholder="e.g. Rice, Biryani, Bread"/>
        </div>

        <div class="form-group">
          <label>Category</label>
          <select id="category">
            <option value="">Select Category</option>
            <option>Cooked Food</option>
            <option>Raw Vegetables</option>
            <option>Bakery Items</option>
            <option>Dairy Products</option>
            <option>Fruits</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="quantity" placeholder="e.g. 10"/>
          </div>
          <div class="form-group">
            <label>Unit</label>
            <select id="unit">
              <option>Kg</option>
              <option>Litres</option>
              <option>Packets</option>
              <option>Servings</option>
              <option>Boxes</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Pickup Address</label>
          <input type="text" id="pickupAddress" placeholder="Restaurant address for pickup"/>
        </div>

  <div class="form-row">
  <div class="form-group">
    <label>Available From</label>
    <div class="time-row">
      <input type="time" id="availableFrom"/>
      <select id="fromPeriod">
        <option>AM</option>
        <option>PM</option>
      </select>
    </div>
  </div>
  <div class="form-group">
    <label>Available Until</label>
    <div class="time-row">
      <input type="time" id="availableUntil"/>
      <select id="untilPeriod">
        <option>AM</option>
        <option>PM</option>
      </select>
    </div>
  </div>
</div>
        <div class="form-group">
          <label>Additional Notes</label>
          <textarea id="notes" placeholder="Any allergy info, special instructions..."></textarea>
        </div>

        <button onclick="postFood()">🍱 Post Donation</button>

        <div id="successMsg" class="success-msg" style="display:none;">
          ✅ Food posted successfully! NGOs and volunteers can now see your donation.
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="../js/app.js"></script>

</body>
</html>
