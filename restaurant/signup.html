<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurant Signup</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>

  <nav>
    <h1>🍱 Food Donation Connector</h1>
    <div>
      <a href="../index.html">Home</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <div class="auth-container">

    

    <div class="auth-box">
      <h2>🍽️ Restaurant Signup</h2>
      <p class="auth-sub">Join us and start donating surplus food today!</p>

      <input type="text" id="restaurantName" placeholder="Restaurant Name" />
      <input type="email" id="email" placeholder="Email Address" />
      <input type="tel" id="phone" placeholder="Phone Number" />
      <input type="text" id="address" placeholder="Restaurant Address" />
      <input type="password" id="password" placeholder="Password" />
      <input type="password" id="confirmPassword" placeholder="Confirm Password" />
      <button onclick="handleSignup()">Create Account</button>

      <p class="switch">Already have an account? <a href="login.html">Login</a></p>
    </div>

  </div>

  <script type="module" src="../js/app.js"></script>

</body>
</html>
