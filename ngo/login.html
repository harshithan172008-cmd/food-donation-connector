<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NGO Login</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>

  <nav>
    <h1>🍱 Food Donation Connector</h1>
    <div>
      <a href="../index.html">Home</a>
      <a href="../restaurant/login.html">Restaurant Login</a>
    </div>
  </nav>

  <div class="ngo-login-container">
    <div class="ngo-image-side">
      <img src="../images/ngo.png" alt="NGO volunteers"/>
      <div class="ngo-overlay">
        <h3>"Together we can end hunger"</h3>
        <p>Join hundreds of NGOs already making a difference</p>
      </div>
    </div>

    <div class="ngo-form-side">
      <div class="auth-box">
        <h2>🏢 NGO Login</h2>
        <p class="auth-sub">Welcome back! Login to claim surplus food.</p>

        <input type="email" id="email" placeholder="Email Address" />
        <input type="password" id="password" placeholder="Password" />
        <button onclick="handleLogin()">Login</button>

        <p class="switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
      </div>
    </div>
  </div>

  <script type="module" src="../js/app.js"></script>

</body>
</html>
